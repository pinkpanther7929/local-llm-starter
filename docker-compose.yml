services:
  vllm:
    profiles:
      - vllm

    build:
      context: .
      dockerfile: Dockerfile.vllm

    container_name: vllm
    restart: unless-stopped

    runtime: nvidia
    ipc: host
    shm_size: "16gb"

    ports:
      - "${VLLM_PORT:-8000}:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/flashinfer:/root/.cache/flashinfer

    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}

      CUDA_HOME: /usr/local/cuda

      CC: /usr/bin/gcc-14
      CXX: /usr/bin/g++-14

    command:
      - ${MODEL_ID:-Qwen/Qwen3-14B-AWQ}

      - --host
      - 0.0.0.0

      - --port
      - "8000"

      - --served-model-name
      - ${SERVED_MODEL_NAME:-qwen-14b}

      - --max-model-len
      - "${MAX_MODEL_LEN:-8192}"

      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.85}"

      - --reasoning-parser
      - qwen3

      - --enable-auto-tool-choice

      - --tool-call-parser
      - qwen3_coder

  ollama:
    profiles:
      - ollama

    image: ollama/ollama:latest

    container_name: ollama
    restart: unless-stopped

    ports:
      - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      - ollama:/root/.ollama

    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

  open-webui:
    image: ghcr.io/open-webui/open-webui:main

    container_name: open-webui
    restart: unless-stopped

    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"

    environment:
      OPENAI_API_BASE_URLS: http://agent-gateway:8010/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-local}
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>&format=json

    volumes:
      - open-webui:/app/backend/data

    depends_on:
      - agent-gateway
      - searxng

  agent-gateway:
    build:
      context: ./gateway

    container_name: local-llm-agent-gateway
    restart: unless-stopped

    ports:
      - "${AGENT_GATEWAY_PORT:-8010}:8010"

    environment:
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL:-http://vllm:8000/v1}
      SEARXNG_URL: http://searxng:8080/search
      DEFAULT_MODEL: ${SERVED_MODEL_NAME:-qwen-14b}
      MAX_TOOL_ROUNDS: ${MAX_TOOL_ROUNDS:-4}
      UPSTREAM_RETRIES: ${UPSTREAM_RETRIES:-6}
      UPSTREAM_RETRY_DELAY_SECONDS: ${UPSTREAM_RETRY_DELAY_SECONDS:-2}

    depends_on:
      - searxng

  searxng:
    image: searxng/searxng:latest

    container_name: searxng
    restart: unless-stopped

    ports:
      - "${SEARXNG_PORT:-8081}:8080"

    environment:
      BASE_URL: ${SEARXNG_PUBLIC_URL:-http://localhost:8081/}
      INSTANCE_NAME: local-llm-search

    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

volumes:
  open-webui:
  ollama:
